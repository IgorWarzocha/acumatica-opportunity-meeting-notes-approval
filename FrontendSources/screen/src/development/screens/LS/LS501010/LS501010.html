<template>
	<qp-template id="Document_template" name="7-10-7" class="equal-height" qp-collapsible wg-container="Document_form">
		<qp-fieldset id="Document_formLeft" slot="A" view.bind="Document">
			<field name="ApprovalID" pinned></field>
			<field name="Status" pinned></field>
			<field name="MeetingDate" pinned></field>
			<field name="ApprovedDateTime"></field>
		</qp-fieldset>
		<qp-fieldset id="Document_formCenter" slot="B" view.bind="Document">
			<field name="ExternalMeetingID" pinned></field>
			<field name="ExternalClientReferenceID"></field>
			<field name="MeetingTitle" pinned></field>
		</qp-fieldset>
		<qp-fieldset id="Document_formRight" slot="C" view.bind="Document">
			<field name="OrganizerEmail"></field>
			<field name="TranscriptUrl"></field>
			<field name="ActivityNoteID"></field>
			<field name="CreatedDateTime"></field>
		</qp-fieldset>
	</qp-template>
	<qp-tabbar id="Document_tab" wg-container>
		<qp-tab id="matching_tab" caption="Matching">
			<qp-template id="matching_template" name="1-1" class="label-size-m">
				<qp-fieldset id="groupMatching" slot="A" view.bind="Document">
					<field name="SuggestedOpportunityID"></field>
					<field name="SuggestedOpportunitySubject"></field>
					<field name="ConfirmedOpportunityID"></field>
					<field name="ConfirmedOpportunitySubject"></field>
				</qp-fieldset>
			</qp-template>
		</qp-tab>
		<qp-tab id="summary_tab" caption="Summary">
			<qp-template id="summary_template" name="1-1" class="stretch label-size-m">
				<qp-fieldset id="groupSummary" slot="A" view.bind="Document">
					<field name="ParticipantEmails"></field>
				</qp-fieldset>
			</qp-template>
			<qp-rich-text-editor id="edMeetingSummary" state.bind="Document.MeetingSummary" class="stretch" wg-field></qp-rich-text-editor>
		</qp-tab>
		<qp-tab id="transcript_tab" caption="Transcript">
			<qp-rich-text-editor id="edTranscriptHtml" state.bind="Document.TranscriptHtml" class="stretch" wg-field></qp-rich-text-editor>
		</qp-tab>
		<qp-tab id="diagnostics_tab" caption="Diagnostics">
			<qp-template id="diagnostics_template" name="1-1" class="label-size-m">
				<qp-fieldset id="groupDiagnostics" slot="A" view.bind="Document">
					<field name="MatchDiagnostics"></field>
					<field name="ErrorMessage"></field>
				</qp-fieldset>
			</qp-template>
		</qp-tab>
	</qp-tabbar>
</template>
